<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pocket Arcade Club — TikTok authorization</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
         max-width: 660px; margin: 0 auto; padding: 40px 20px; color: #22303a; line-height: 1.55; }
  code { background: #f2f5f7; border-radius: 6px; padding: 2px 6px; word-break: break-all; }
</style>
</head>
<body>
<h1>TikTok authorization received</h1>
<p id="status">Reading response…</p>
<p class="muted">This page is the OAuth redirect target for Pocket Arcade Club Poster.
You can close this tab; the pipeline reads the code automatically.</p>
<script>
  const q = new URLSearchParams(location.search);
  const s = document.getElementById("status");
  if (q.get("code")) {
    s.innerHTML = "Authorization code received: <code>" + q.get("code").replace(/</g,"&lt;") + "</code>";
  } else if (q.get("error")) {
    s.textContent = "Authorization failed: " + q.get("error_description") || q.get("error");
  } else {
    s.textContent = "No authorization parameters present.";
  }
</script>
</body>
</html>
